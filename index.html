proach religion like this. Sometimes we have this idea that maybe Jesus came to make death a little more tolerable. That when we show up to a graveside or a funeral that maybe we could feel some comfort in that moment almost like a band-aid does for a child. I've got a three-year-old and a four-year-old. And there is something psychologically beneficial to the band-aid company because kids are convinced that band-aids will cure things. You know, I I saw an article by uh Usha Lee McFarland, who's a Pulitzer Prizewinning science and medical writer in the in Los Angeles. She says this, \"Band-aids don't only contain blood and scrapes. They also seem to contain fear to the very young. They make boo boos literally disappear. Band-aids and other brands of bandages have always held this power long before a parade of characters irresistable to kids. Spider-Man, Hello Kitty, Barbie, Scooby-Doo, and Dora started inhabiting the strips. And then she says this, \"Sorry, Johnson and Johnson. It's not the band-aids you've manufactured since the 1920 that makes cuts and scrapes feel so much better. It's the closeness, the attention, the hugs and kisses kids get when the strips are applied. You have to get close to put on a band-aid. Laps are the best. Often tears stop before the band-aid is even out of a sterile wrapper. You know, I think many of us are much like my four-year-old. We sometimes mistake the band-aid for the cure. Many of us approach religion like, \"If I can just do some things that can that can make me feel better about life and may maybe make death a little little more tolerable.\" In fact, Jes when Jesus arrived on the scene, many of the religious teachers had that mindset. Like if we could create a religious structure that if we do the right things, say the right things, pray the right amount of time, then maybe death would be a little more tolerable. And church, I've got one message for you this morning, and it's based on the empty tomb. And it's this. Jesus did d I watched all the services on YouTube and I just started really feeling really excited about Jesus and I felt really drawn to come to launch day service. So I asked my mother and my son would they be interested in checking out this new church with me. So, we came to launch day and I was so nervous coming in, but everybody was so nice and so friendly and made me feel very welcomed and they have the best cookies in the little welcome bags. Um, and so we have been attending ever since. And I got invited to one of their weekly community groups. And going to that, I've gotten to know so many other people. And just being in that small group and be able to talk about Jesus and ask questions and learn about Jesus. Just such a great environment. And so now I really feel like East Point Church is my spiritual home, my spiritual family. And I really feel now I understand what Matthew 11:30 means when Jesus said, \"My yoke is easy and my burden is light.\" And so I know now is the time I need to give my life to Jesus. >> And I'm and I'm doing it today as a symbol of what Jesus has done for me. He died for my sins and he has rose so that I can live my new life. So, thank y'all. Praise God. uh met with Bambi a few weeks ago and part of what she shared with me and I I think you just shared it so eloquently was I was looking for life in dead places and then I found Jesus and we're going to celebrate that this Starting.","url":"https://www.youtube.com/watch?v=u-wmJo0G2WY"},{"id":"jB_pE3e_gBk","date":"2026-03-31","title":"Palm Sunday","scripture":"Luke 19:28–42","preacher":"Peter Frey","series":"Special","desc":"On Palm Sunday in Luke 19, Jesus enters Jerusalem as King, welcomed with praise yet moving toward the cross. Join Pastor Peter Frey as he shares the significance of this moment and how it points to real hope for real life at Eastpoint Church in Durham, NC.","transcript":"Um, let's remain standing as we prepare our hearts for the reading of God's word. Join me in reading aloud this prayer for illumination. The words will be on the screen. God, our helper, by your Holy Spirit, open our minds that as the scriptures are read and your word is proclaimed, we may be led into your truth and taught your will for the sake of Jesus Christ, our Lord. Amen. Please remain standing as you're able for the reading of God's word from the Gospel of Luke chapter 19 verses 28 through 42. After Jesus had said this, he went on ahead going up to Jerusalem. As he approached Bethphage and Bethany at the hill he called the Mount of Olives, he sent two of his disciples saying to them, \"Go to the village ahead of you, and as you enter it, you will find a colt tied there, which no one has ever ridden. Untie it and bring it here. If anyone asks you, 'Why are you untying it?' say, 'The Lord needs it.'\" Those who were sent ahead went and found it just as he had told them. As they were untying the colt, its owners asked them, \"Why are you untying the colt?\" They replied, \"The Lord needs it.\" They brought it to Jesus, threw their cloaks on the colt, and put Jesus on it. As he went along, people spread their cloaks on the road. When he came near the place where the road goes down the Mount of Olives, the whole crowd of disciples began joyfully to praise God in loud voices for all the miracles they had seen. \"Blessed is the king who comes in the name of the Lord. Peace in heaven and glory in the highest.\" Some of the Pharisees in the crowd said to Jesus, \"Teacher, rebuke your disciples.\" \"I tell you,\" he replied, \"if they keep quiet, the stones will cry out.\" As he approached Jerusalem and saw the city, he wept over it and said, \"If you, even you, had only known on this day what would bring you peace. But now it is hidden from your eyes.\" This is the word of the Lord. Amen. Church, you may be seated. I It's good to be back with you, East Point Church. Last week I had the joy of preaching at one of our partner churches in Cary, The Point Church. And they send their love and greetings, and I I shared this as our volunteers huddled this morning, but I'll share it with all of you. Uh there were multiple times over the course of the morning that somebody would come up to me and say, \"It's so good to put a face to your name. Uh we've been praying for you.\" And it is such a beautiful picture of um as we think about here we are celebrating our first Holy Week as a church, and we think about this reality that it's so much bigger than us. Uh we aren't here for East Point Church. We aren't here uh to build our kingdom. We are here because Jesus is king across Durham, across the triangle, and across the globe. And there is something rich as I just uh celebrate joining together in our first Holy Week as a church, there's something each year as we come to Holy Week that's kind of uh sobering that we are joining with followers of Jesus throughout generations and across the globe in celebrating these events that change everything. That Jesus' life, death, and resurrection uh changes everything. So, as we journey this week to sit in the significance of Jesus' journey to the cross and anticipate with sobering expectation the celebration and meaning of Resurrection Sunday, we turn this morning to Luke chapter 19, the passage that Meg just read for us verses 28 through 42. And here in this passage, we meet Jesus on his way to Jerusalem. I'm going to uh tell the Adventures kids to uh head to their classes. I forgot to mention that. So, Adventures, you guys can head to your Adventures class. Um Here in Luke chapter 19, we meet Jesus on his way to Jerusalem. Now, as we read the gospel narratives, I think it's easy to get lost in the journey from one city or village to another. Uh I've been reading through the Gospel of Luke in my uh daily Bible reading and sometimes it can feel like Jesus and his disciples travel from one place uh to another and it it's kind of um it's as if they're just going wherever the road might lead. But, in Luke's gospel, he makes it clear that the journey Jesus takes through his earthly ministry is not an aimless wandering, but a purposeful path with a destination and timing that was determined long before the moment when Jesus enters Jerusalem in Luke 19. You see, if we rewind a little bit back in Luke chapter 9 verse 51, we read, \"As the time approached for him to be taken up to heaven, Jesus resolutely set out for Jerusalem.\" So, this is 10 chapters before earlier in Jesus' ministry, we find this decisive moment where Jesus resolutely set out for Jerusalem. Now, this phrase Jesus resolutely set out for Jerusalem is literally translated, \"He set his face toward Jerusalem.\" Now, this is this is an idiom, a figure of speech, but it kind of speaks for itself. Gabe, our 3-year-old, when he wakes up in the morning, he often has one thing on his mind. He's very into what he calls bars. And these are like granola bars. And so, when he comes downstairs, he bee-lines it for the pantry. And he just goes straight for the pantry. And And the image here of setting his face, I I can see Gabe doing this. He just literally will not look away from the pantry. And he goes, \"Bar, bar, bar.\" Um it What that picture, that figure of speech is saying, there is a mission, a goal that he's setting his mind on. And that is what we're told Jesus is doing in Luke chapter 9 verse 51. He resolutely sets his gaze on Jerusalem. It In fact, it is describing here in the Gospel of Luke Jesus' determination and resolution to accomplish the purpose for which he came to Earth. And that purpose would be accomplished in a certain place at a certain time in Jerusalem during the week of Passover. And so, all throughout Luke's gospel from chapter 9 to chapter 19 that we're looking at this morning, we see this repeated comment. Luke 13:22 says, \"Jesus made his way to Jerusalem.\" Luke 17:11 says, \"Jesus on his way to Jerusalem.\" Luke 18:31 says, \"He tells his disciples, we are going to Jerusalem.\" So we act, I went to Habitat for Humanity this week and I said how much are your doors? And they they showed me the doors and they were like giving me the pricing. I was like, \"Okay, so here's the deal. I need this for a sermon illustration. What's your cheapest door?\" And sweet Nancy goes, \"Oh, you need it for a sermon illustration? You can have this one for free.\" So, shout-out to Nancy at Habitat for Humanity. Um okay, so and we know what the image of a closed door is because like there is we we use it all the time in our vernacular. Like we're like there's a closed door to this opportunity. Like we often talk about God closing a door when we don't get a job or things like that. It Paul is imprisoned which in many ways feels like a closed door to what he was called to do. Plant churches, lead people to Jesus. And he says, \"Church, I want you to pray that God would open doors. That God would open doors.\" And and and as I think about this, we have a core value here at Eastpoint Church. You see it in the hallway every week when you go to the bathroom. It says, \"We expect God to change lives.\" That's our core value as a as a church. we want to lean into this kind of expectation that that we expect God to change lives. And and And so, as Paul is praying from prison, he says, \"Pray that I'm going to have an opportunity to see doors opened for me to proclaim Jesus.\" And he What How does he describe it? He describes it as the mystery of Christ, which is that What is this mystery? Well, that Christ wants to come and indwell his people. That he loves you so much that no matter what you've done or where you're from or what you think you bring to the table, you don't measure up to him, and he says, \"I love you anyways, and I want to come in and indwell you and give you new meaning and life and purpose.\" This is the mystery of Christ. He's He's like, \"Pray that even in my chains, there would be doors opened.\" And this is where I think prayer starts to change us. Because when we devote ourselves to the to the practice of dependence upon God, man, we start to see even the hard things in our lives as not just a hard thing, but it's a door that we want to see God open. A circumstance that we want to see God redeem. A a piece of And in some ways, it's like there are moments in our lives where we feel like we're walking through hell, and we're like, \"We want to see heaven break into hell. Like, we want to see the kingdom of God,\" as Jesus taught us to pray, \"in Easter room as it is in heaven.\" And as we do that, we pray, \"God, would you open doors?\" And so, here here's here's my first encouragement for us this morning is would we pray that God would open doors? Um I wonder what circumstances in your life come to mind that feel like a closed door to God's plan and purposes. Maybe it's a relationship that you long for them to experience Jesus. Maybe it's a another just like unexplainable suffering in your life. And and Paul invites us would we pray that God would open the door of what seems like a a roadblock to God's plan. And God, would you work? And so will we be a church, and this is my encouragement to us this morning, is that we will be a church that is has a life shaped by prayer that has an expectation that God is a God who opens doors. And as we do that, here's what Paul points us to. When we pray like that with that kind of expectation, we start to live like the doors have been opened. We start to live like the doors have been opened. Look at how the passage continues in verse 5. Be wise in the way you act toward outsiders. Make the most of every opportunity. Let your conversation be always full of grace, seasoned with salt, so that you may know how to answer everyone. Paul points us to a way of living that lives as if the doors have been opened. To view our lives as gospel opportunities, and this is this is part of what this looks like. It it's like there are people in our lives who feel like they are a closed door to Jesus' work. But the reality is, yeah, that may be true. And we need to pray for God to open that door, but the reality is our lives are an open door to what Jesus can and has done. And so, I want us to view our lives as just a place where uh God opens doors. Live like the doors have been opened. Um be wise in the way you act toward outsiders. Make the most of every opportunity. I As we think about the spheres in our lives where God has put us. I mean, each of you have different stories. Maybe it's the family that you stay home with. Maybe it's the people that you're surrounded with, whether on a Zoom call or in an office. Maybe it's the neighbors that God has put around you or the circle of friends that you have accumulated over years. Paul says this, make the most of every opportunity. It It It goes back to that watchfulness. Praying with your eyes open. Look for ways that God might be inviting you to be the open door. To be the answer to that prayer. And so, yeah, we pray that God would open closed doors, but we live like he does. And And this is This is I think at the heart of this passage is our core value. We expect God to change lives. What does that look like in everyday life? Well, we want to be a church that is radically dependent upon God in prayer. And so, we expect God to change lives. Live accordingly. Well, what does that look like? Man, we're going to pray that God's going to open doors in this term for people to experience the life-giving and transforming work of Jesus. We're going to pray for the closed doors here in this elementary school of families that that that feel pretty isolated. That God would open doors for them to experience the love of Jesus. For them to experience the hands and feet of Jesus. And and and so not only do we view our circumstances as opportunities, but we think about how we talk. We talk in a way that others can taste the goodness of the gospel. He says, \"Let your conversation always be full of grace, seasoned with salt, d with Christ like let that fill your conversation sometimes. Like that this is our hope. That this would season our lives. That we talk in such a way that others taste the goodness of who Jesus is, what he's done in our lives. And so we pray with eyes open and hearts full. And I think that leads us to pray with expectation that God does change lives. And it invites us into a place of uh of transformation. Tyler Staton has written a couple books on prayer. One is Praying Like Monks, Living Like Fools. And it Some of his resources, he leads a movement called 24/7 Prayer. Some of his resources have been really helpful for me in prayer. And one time I heard him say this and I I think this is something I long to continue to grow into. It says, \"Uh becoming a person of prayer is is a process of becoming less and less concerned with what happens between dear God and amen and more concerned about what happens after amen.\" And I think that that is what God is inviting us into as a church. That we would be a people of prayer, but that's less about like what these words that we say to God, and it's more about the posture of our hearts of expectation and faith. That we believe that God changes lives and that he invites us to be part of that. And so we want to say, \"God, would you transform us in such a way that our conversation would be so gracious, so seasoned with salt, that we would know how to answer everyone?\" And implicit in that statement is that people are asking about it. And so he's talking about a way of life that just begs people to ask, \"Hey, what's different? What's different?\" And I find for me that it is the conversations that Jesus invites me to think about this in in is really the conversations of where does the brokenness of the world in my own heart and life meet the hope of Jesus? So often like I think my conversations being gracious and seasoned with salt is when I'm talking shop with my neighbor and we're talking about what's hard in our lives and hy his life, death, and resurrection means.\" It's like, \"Here Here's what penal substitution is and justification and um like all these things.\" And I think what Paul's holding out to us is like one, believe that God changes lives and pray that he would, and then let your speech be colored by what you've tasted. Just be like, \"I've tasted that Jesus is good. It doesn't even make sense of all the brokenness of our world today, but I believe and I'm holding on that I have hope beyond the brokenness that I see. That I do get really anxious, but there's like Jesus talked about how he leaves us with peace, and I've tasted that peace. I don't always understand it. Actually, the Bible says it's a peace that transcends understanding.\" And that is what we have to offer to a hurting world. Yes, like the theology and the academic side of things, like that's all good, and we can talk shop, but like whenever you want. And we can read books and like I want us to grow in the knowledge, but when Paul says in Colossians chapter 2, \"Just as you received Christ, continue to walk in him, letting your roots go down and be established in him, like overflowing with thanksgiving.\" I think he has in mind that we would just be people who'd be like, \"We've tasted and seen that Jesus is good.\" As I read the stories of the early church, I read and see like a ragtag group of people who witnessed a resurrected savior. And they didn't have some big strategy. They just devoted themselves to prayer and told people Jesus rose from the dead. And 2,000 years later, we're still here this morning celebrating that reality. We stand on the shoulders of giants who believed that God changes lives. And we want to join them in that.","url":"https://www.youtube.com/watch?v=3ahl-C-sBk0"},{"id":"0tKAGTKbHqU","date":"2026-03-09","title":"How the Gospel Changes My Relationships","scripture":"Colossians 3:15–4:1","preacher":"Peter Frey","series":"Colossians","desc":"In Colossians 3:15–4:1, Paul shows how th  provide your slaves with what is right and fair, because you know that you also have a master in heaven. This is the word of the Lord. At this time, we will dismiss the kids in the Adventurers class. Uh Kiddos, have fun in Eastpoint Kids. Good morning, Eastpoint Church. It's uh great to be worshipping with you this morning. Uh it feels a bit like spring um or summer. It is warm in here. Um thank you for uh bearing with the humidity in this gymnasium this morning. There are some things out of our control. And um and and isn't that faith? Learning to relinquish control. Well, this morning, I want to one say, I'm so glad that you're worshipping with us if you're visiting with us. Um man, what a sweet morning already of just uh hearing the story of hope and proclaiming that we follow and worship a God of real hope. And that is uh what we're all about. Um well, I want to point you to something coming up in just a month, and that is Easter weekend. And so, I want to like uh it's crazy it comes early this year. It's on April 5th is Easter Sunday, and uh I'm going to talk about this a little toward the end of my sermon, but I want to encourage you as we look forward to our first Easter as Eastpoint Church. Um I was sharing this with some some people in our church yesterday that uh there's something about Easter Sunday that is special uh especially special for Christians. Like, as followers of Jesus, Easter is the Super Bowl of who we are. It is the moment we celebrate what our hope is built on, but it's a especially special for us as Eastpoint Church, because our mission as Eastpoint is to point a hurting world to hope in Jesus. And our hope that we have to offer is grounded in the resurrection of Jesus from the dead. And so, um I'm just pumped for Easter Sunday, for our first Easter as Eastpoint Church. And something we know um actually, there were some reports following last Easter um that across the nation, there were all-time highs in attendance of Easter in comparison ing, and the Jews who had come with her also weeping, he was deeply moved in his spirit and greatly troubled.\" When we look at the brokenness around of the world around us and within us, it is appropriate and right to have a troubled heart. Jesus shows us this. So what then is Jesus holding out to us in John 14 when he says, \"Let not your heart be troubled.\" He wants us to know that there is hope. There is a cure for your troubled heart and mine. And it's not a religious system that offers an escape from trouble. It's not a set of principles for living that calms the trouble. It's not a promise of prosperity that keeps you from the trouble. It is not a mindset of positivity that changes your perspective on the troubles. Jesus tells us here in John 14, there is one cure for your troubled heart and mine. And Jesus says, it's me. I am the only hope for your troubled heart. And notice what he says in this passage. Let not your hearts be troubled. Believe in God. believe also in me. Jesus is not holding out a formula for inner peace or religious devotion as a cure for your troubled heart. He is inviting us to believe. But not just to believe in anything. Our culture loves this idea that the object of your belief is not what matters. It's about the sincerity of your belief. But hear me clearly. The cure for your troubled heart and mine is not simply believing. It is who you're believing that matters. He says, \"Believe in God. Believe also in me.\" On Wednesday of this week, I was taking Elijah, our three-year-old, and he's almost four. I was taking him to school, and I could tell on the way to school that he was deeply reflecting on something. And about 10 minutes into the drive, he goes, \"Hey, Dad. Why did God make our bodies puke?\" And I It's a great question. And so here I am. I've got five minutes to before we get to school and I've got to explain why our bodies puke. And so I started here. I said, \"Elijah, you know what? The world and our bodies don't work like the way they were supposed to. Uh, sometimes you hear us talk about we live in a broken world and because of the sin, do you remember what sin is?\" He's like, \"No.\" And so I said, \"Okay, four minutes left.\" Okay. So sin is, you know how when mommy and daddy say choices have consequences? Well, God designed us to live in such a way and where we find flourishing in life. And some of the rules that mom and dad give you, they are so that you can flourish, Elijah. And so God ordered our world in a similar way. And when we don't follow that order, it's something we call sin. It's breaking God's law. And it's not that he's trying to be a a mean person. He's trying to help you. And so that there there's consequences of that. And so in our world that things don't work like they're supposed to and sometimes you puke. And and I'm thinking I I wonder how I'm doing. And and I was like, okay, we've got two minutes now to get to school and I've got to give him some hope here. And I said, you know what, but you know, one day Jesus is going to change that. One day Jesus is going to make everything sad untrue. And one day that your body that doesn't work like it's supposed to and sometimes it pukes is going to be redeemed by Jesus. And and and all that Jesus invites us to do is trust him. And Elijah goes, \"What's trust?\" I'm like, \"I got one minute.\" And I and I literally took 30 seconds to come up with my answer. And I said, ' Elijah, you know when you stand on the top of the stairs and you tell me to go halfway down the stairs and then you say, \"Dad, catch me.\" That's trust. You are believing that I will catch you. And he goes, \"Oh.\" And then he goes, \"But dad, if mom jumped off the top of the stairs, she would crush you.\" Elijah's three years old and he is grasp he is grasping a critical truth of trust. It's not about the amount of faith a person has. It's about who they are trusting in. Can they catch your weight? And here in John 14, Jesus wants to turn our eyes orld. Christianity is about a person who took on flesh, stepped into the brokenness, who said, \"I have a troubled heart.\" And he said, \"Do not let your heart be troubled. Put your trust, put all your weight in the fact that I can catch you.\" And nothing in this broken world, the uncertainty of health, the unpredictability of relationships, the the things that keep you up at night is outside the domain of what Jesus says, I will be with you. And so, as the passage goes on, Thomas, who's a little bit of a um he's a little bit of a realist, he's like Jesus, you're saying you know that we know the way. How do we know the way? We don't know. We don't even know where you're going. And Jesus says to him, \"I am the way. I am the truth. I am the life.\" This is one of these I am statements in the gospel of John where each of these statements is revealing to us something about Jesus's identity that we are supposed to see this as oh a framework a paradigm for how we understand faith and Jesus says I am the way. Now if you go in your your phone and you um maybe some of you did this this morning maybe you typed in East Point Church Durham and it brought it up on your GPS. Now you there is when you talk about the way you can think about the path the route that you're going to take but you can also Google maps will allow you to do this you can also there's another kind of way and that is like how are you going to get there are you going to go by foot because that would be a lot longer than it probably was for your drive-in. Are you going to go by public transit or are are are you going to go by car? And it lets you choose those and it'll give you um a diff a route for that. What Jesus is saying when he says, \"I am the way.\" What Jesus is saying, \"I am both the destination and the mode of finding true and lasting peace. The cure for your troubled heart and mind is seeing that Jesus is both the destination that our hearts are longing for and the means by which our hearts find true and lasting peace. And so here uh Jesus says, \"I am the way, the truth, and the life. No one comes to the father except through me. I'll acknowledge that this verse is a stumbling block for many because what Jesus is claiming here in the this verse is that there is one way there is one cure for our troubled hearts for the brokenness that we find in our world and he is saying I am the only hope. Now, now many in our culture today find a problem with that. They say, \"Well, what about other religions that claim to be the way? What about uh this path or this path?\" And and and many will say, \"Well, maybe all of these paths are are are are leading to the same destination.\" And T writes says this, and I think it's helpful. He says, \"The trouble with this is that it doesn't work. If you dethrone Jesus, you enthrone something or someone else instead. The belief that all relig religions are really the same sounds nice and democratic. Though the study of religions quickly shows that it isn't true. What you are really saying is that if you claim that they're all the same and I is that none of them are uh more than distant echoes, distorted images of reality. You're saying that reality, God, the divine is remote and unknowable. That neither Jesus nor Buddha nor Moses nor Krishna gives us direct access to it. They all provide a way toward the foothills of the mountain, not the way to the summit. But here in John 14, Jesus says,\"I am the way. I am the truth and the life.\" We're walking through the Gospel of John and and in each of these texts, we're seeing Jesus saying, \"I am offering you to you life, real life, flourishing life as it was meant to be lived.\" And here in almost a pinnacle moment of the gospel, Jesus says, \"You can't find it anywhere else. It is only in me.\" And Jesus wants to be clear about the cure for your troubled heart and mine in the verses that follow this because Philip says he he's kind of like um I after verse six it it says in verse 7 ace where you find peace is not the paradise of heaven. It is the presence of Jesus. That is what heaven is all about. And what Jesus wants you to get this morning is that that is what the way of Jesus is all about. The way of Jesus is about walking in his presence. Because just a few verses later in verse 27, Jesus is going to say this. He's going to say, \"Peace I leave with you. My peace I give to you. Not as the world gives do I give to you. And he says it again, let not your hearts be troubled, neither let them be afraid. Jesus echoes these words, let not your heart be troubled in the context of what he just before this verse, he says, I'm going to go away, but I'm going to send another. It is a helper. It is the spirit of God. the spirit of God that lives and dwells within every follower of Jesus. And the invitation of the gospel when Jesus says, \"I am the way, the truth, and the life. No one comes to the father except through me.\" Is that we do have a future hope that one day God will Jesus will return and God will make all things new. But that future hope changes our present reality because the spirit of God, the risen Christ lives within us and invites us to walk in him and be part of his change in our world today. And so when Jesus says, \"Let not your heart be troubled,\" this is no fortune cookie. This is no trit word. This is the words of the one who would conquer death and offer peace for your troubled heart and mine. And so in many ways the these this verse John 4:14:6 I am the way, the truth, and the life is is something that that every person in this world needs to hear that Jesus does offer a cure for your troubled heart and mind. He offers hope beyond the grave. You know, I if if you're not a follower of Jesus this morning, I want you to hear that. But I also want you to hear if you're a follower of Jesus, I think these words are for you. That the way of Jesus, that the truth of Jesus, that the life of Jesus is found when we look to Jesus and his presence as our only hope. Not escaping, but being. You were made for a relationship. Eugene Peterson says this, \"The Jesus way wedded to the Jesus truth brings about the Jesus life.\" Jesus as the truth gets far more attention than Jesus as the way. Jesus as the way is the most frequently evaded metaphor among the Christians whom I have worked with for 50 years as a North American pastor. And he goes on to say this, we can't suppress the Jesus way in order to sell the Jesus truth. The Jesus way and the Jesus truth must be congruent. Only when the Jesus way is organically joined with the Jesus truth do we get the Jesus life. And I think it goes without saying that when you wed the Jesus truth with any other way, you have a corruption of what life as God has designed it. When you wed the Jesus truth with the American way, you have corrupted politics. You have a corrupted worldview. You have the lie that's that peace that rests for your troubled heart can be accomplished in the success of your career, the accumulation of money and the reputation in society. And Jesus says, \"I am the way.\" If you want the truth that I am the life, you have to follow the Jesus way. And what is the Jesus way? Just the chapter before this, he took off his robe and he washed his disciples feet and he said, \"If you love me, you'll follow my commands.\" What's my command? Love one another. This is the way of Jesus. This is the truth that your troubled heart is longing for. And this is where life is truly found. The place where you find peace isn't the paradise of heaven. It's the presence of Jesus. And he is here this morning. And he is inviting you to lay down any other way that you are seeking to flourish. Any other way that you are seeking truth, he is inviting you to find life and life abundantly. We are going to respond this morning in three ways. Uh the first is we're going to sing together. We're going to sing three songs. Why? because we believe that Jesus is worthy of our praise. Second way we're going to respond is we're respond in prayer. During these songs, there'll be a couple people on the edges of the room wearing a green lanyard. And if you would like somebody to pray with you this morning, pray over you, pray for you. I invite you to take advantage of these people. And then the third way we're going to respond is if you are a follower of Jesus, we have a practice that we return to weekly. And it's something that Jesus instituted with his disciples when he said he took the bread and he broke it. And it in some ways is like an object lesson, but it's more than an object lesson. He said, \"This is my body which is broken for you.\" and he took the cup and he said, \"This is my blood that is shed for the forgiveness of sins. As often as you eat this bread and you drink this cup, you proclaim the Lord's death until he comes.\" And this is the invitation of the table. This is if you are a follower of Jesus, we return to this table for one reason, to remember that we find life in Jesus and nothing else. And so I invite you at any point during these three songs to come to the table, take a piece of bread, dip it in the cup, and take it and remember the good news that there is nothing you can do to earn God's favor. There's nothing you can do, there's nothing that you have done that can keep you from his love and forgiveness. And he invites you to come to him. And so as we respond, let me pray for us. God, my heart feels the unrest, the trouble of a of living in a broken world. And that and I imagine that there are some in this space this morning who feel that. I imagine that every person in here I for some reason or another has something that either keeps them up at night or brings them to the point of exhaustion. And this morning I pray that you would draw our hearts and our eyes to look to you as the way, the truth, and the life. and that we would find in you life as we've always longed for. We pray in Jesus name. Amen.","url":"https://www.youtube.com/watch?v=DEWimoCOmlQ"},{"id":"6GM81BTH-_E","date":"2025-11-11","title":"The Good Shepherd","scripture":"John 10","preacher":"Peter Frey","series":"John","desc":"In John 10, Jesus reveals Himself as the Good Shepherd who lays down His life for His sheep and leads them into life to the full. Join Pastor Peter Frey at Eastpoint Church in Durham, NC, and discover real hope for real life in Christ.","transcript":"Join me in reading aloud this [music] prayer for illumination. The words will be on the screen. Guide us, oh God, by your word and spirit that in your light we may see light and in your truth find wisdom and in your will discover your peace through Jesus Christ our Lord. Amen. Please remain standing as you are able for the reading of God's word from the Gospel of John 10:es 10-18. These are the words of Jesus. The thief comes only to steal and kill and destroy. I came that they may have life and have it abundantly. I am the good shepherd. The good shepherd lays down his life for the sheep. He who is a hired hand and not a shepherd, who does not own the sheep, sees the wolf coming and leaves the sheep and flees, and the wolf snatches them and scatters them. He flees because he is a hired hand and cares nothing for the sheep. I am the good shepherd. I know my own and my own know me, just as the father knows me and I know the father. and I lay down my life for the sheep. I have other sheep that are not of this fold. I must bring them also, and they will listen to my voice. So there will be one flock, one shepherd. For this reason, the Father loves me because I laid down my life that I may take it up again. No one takes it from me, but I lay it down of my own accord. I have authority to lay it down, and I have authority to take it up again. This charge I've received from my father. This is the word of God. >> Thanks be to God. >> You church, you may be seated. >> Hey, it's great to be worshiping with you this morning as we continue in a series throug se to the minor chord of lament. It happens just like that. You get a phone call, you have a conversation, life takes a turn, and all the sudden the major chord of praise that we started with in Psalm 100 this morning, praise the Lord, turns to how long, oh Lord, how long will you forget me? Will you hide from me forever? Now, church, I want you to hear me. We as the church are a people of hope. As Lawrence said, in a few weeks, we're going to pull out the stops and throw a party because we believe that the resurrection of Jesus changes everything. >> But I want to suggest this that hope without lament is simply spiritualized optimism. Hope without lament is spiritualized optimism. Lament is being honest and mourning the pain, brokenness, evil, and injustice that we see in the world around us. And church, I want you to hear this. Did you notice the inscription above this psalm? a psalm of David to the choir director to the director of music church. This is meant to be worship and I want to suggest that we are a people who worship because of hope and part of our worship is lament is being honest that the world is not the way it was meant to be. And so we hear these words of Psalm 13 verse1. How long, oh Lord? How long will you forget me? How long will you hide your face from me? How long must I str wrestle with my thoughts day after day and have sorrow in my heart? How long will my enemy triumph over me? You see, here's what lament does. It refuses to dismiss. The struggle that we feel, the struggle and questions that emerge when I read about God's goodness and power, and yet I see and feel the world's brokenness and pain, and at times those feel in conflict. Lament is grieving that this is not the way it was meant to be. church. We just finished a series a few weeks ago on spiritual disciplines. And one of the things I want to hold out to us this morning is that I believe that we as Western evangelicals need to recover the discipline of praying with lament. And here's what that looks like. It begins with being honest with God about how you feel. church. It's taken me a long time to come to grips with the fact that God knows what I feel before I tell him. There's a great uh documentary on YouTube that's an interview between Eugene Peterson and Bono from YouTube. It's on the Psalms. I encourage you to watch it sometime. But one of the things Eugene Peterson says in there is we need to discover a way to cuss without cussing. And the lament psalms teach us to do that. How long, oh Lord, how long will you hide your face from me? Tell God what you feel and don't be polite about it. We have been cultured, some of us who grew up in the church, we have been cultured to talk to God in a certain way. We talk to our friend or our family and we be like, \"Life really sucks right now.\" And we come to God and we're like, \"Heavenly Father, you are sovereign and good and work all things together for my good.\" >> Amen. >> He knows how you feel before you even say it. So would you tell him? Would you tell him that sometimes life feels like I wrestle with my thoughts day after day and have sorrow in my heart? Now I I I know that there's lots of different personalities in the room. Some of you are Eeyore and some of you are Winnie the Pooh. like that is that that is that is a reality. For some of you, letting your emotions out and having a good cry with Psalm 13 is going to be natural. For others of you, it might be a little more unnatural to tell God, \"I feel like you're hiding right now. But I want to encourage you that regardless of what emotions or maybe tears might come out, you need to be honest with God that this world is not the way it was meant to be. That there are ripples of brokenness all around us. In the Psalms of Lament, Psalm 13 is an invitation to view honesty with God as a part of your worship of him. Because here's the thing that for us to get and really celebrate the resurrection hope of Easter Sunday, we have to lament that death was necessary. >> That the world is broken >> and that there is a reason that we long for something better. And I want to suggest that the more that we lament the brokenness of the world, the more that we will long for the resurrection, the more that we are honest with God about what we feel, the more ready we are to receive the good news of the gospel. So begin with being honest with God. For some of you, that's going to be look like engaging in the practice of journaling. Some of you that's going to look like taking a walk outside and just telling God what you feel. For some of you, it's when you're driving and you have to resist road rage, but you got to just let it out. >> Tell God what you feel and don't be polite about it. >> Notice how the psalm moves in verse three. Look on me and answer, Lord my God. Give light to my eyes or I will sleep in death. My enemy will say, \"I have overcome him. My foes will rejoice when I fall.\" Lament begins with being honest about what you feel. And then lament pleads with God for what you want to feel. The psalmist says, \"Here's his request. Set your eyes on me. I want to feel seen. I want you to I want to feel seen that you know that this brokenness that I'm walking through is not outside of your power and control, your goodness and your grace, your love and your mercy. Because right now I want to suggest the psalmist says, \"How long, oh Lord, will you?\" it. That cry is saying, \"God, I feel like my circumstances are in contradiction to what I believe about you.\" And Psalm 13 is an invitation that if that is you this morning, if you have circumstances of your life that maybe you're even pushing aside, you're like, I don't even know if I'm allowed to bring that into that space this morning. Psalm 13 is an invitation that God is inviting you to hold that tension. So tell him what you feel and then plead with him for what you want to feel. You see, we we want to feel seen. We want to have our eyes see more than despair. I said that hope without lament is simply spiritual optimism. But I want to suggest that hope with lament is a deep spiritual life. Hope with lament will give depth to your waiting on God even when you can't see it. And so the invitation is be honest about how you feel then plead for what you want to feel. In the final movement of this psalm in verse 5 says, \"But I trust your unfailing love. My heart rejoices in your salvation. I will sing the Lord's praise for he has been good to me.\" Now some commentators will say something must have happened between verse four and five. I think that's bull. Okay. I think that the psalmist is holding on to hope regardless of what he feels. And I think that's the third movement of lament. Be honest about what you feel. Plead for what you want to feel. And then hold on to hope regardless of what you feel. Hold on to hope regardless of what you feel. You see, faith says, \"I believe this about God. I believe that he's all powerful. I believe that he's sovereign. I believe that he's merciful and he's good. Trust says, I will hold on to hope even when my faith is blinded by my circumstances. He says, \"I will trust in your unfailing love.\" God's love for you is steadfast. It is sure. When Moses asks, 'Lord, reveal your glory to me, he he sees the Lord pass before him in a cloud and he hears this. The Lord, the Lord, gracious and compassionate, slow to anger and abounding in steadfast love. This is who our God is. And lament, when we're honest with the brokenness, when we when we're honest about what we feel and we plead for what we want to feel, we want to feel seen. We want to see more than despair. Then we can hold on to this reality of even though I can't see it, God, I'm going to put my hope in who I know that you are. Even if my circumstances seem to blind me from that. And so we sit in this place of waiting upon God. Tish Harrison Warren says this, \"God isn't a sadist who delights in using agony to teach us a lesson. But in the alchemy of redemption, God can take what is only sorrow and transform it into the very path by which we learn to love God and let ourselves be loved. This is the strange and usually unwanted way of the abundant life. the dying necessary to bring resurrection. Verse six says, \"I will sing the Lord's praise for he has been good to me.\" How does that sit in the same stanza as how long, oh Lord? How freaking long will you hide your face from me? I think it's because the Psalms of lament are a movement from disorientation to reorientation. It's what we see happen in Psalm 73. The psalmist says, \"Surely God is good to Israel.\" That faith I believe this about God. God is good. Verse two, but as for me, I've nearly stumbled when I look at the prosperity of the wicked. And there's a journey in Psalm 73 from disorientation. God, this is I am disoriented. When I look at the world around me and I sing this on Sunday morning, it's disorienting. And there's a movement throughout Psalm 73 of redefining God's goodness. It starts with I struggle with it because I look at the wicked prospering. But how does it end? My flesh and my heart may fail, but God is the strength of my heart and my portion forever. And then the last verse of Psalm 73, but for me it is good to be near God. >> And so here in Psalm 13, we hear these words. I will sing the Lord's praise for he has been good to me even in the place of me feeling like he's absent. The psalmist comes back to holding on to hope of believing what he knows is true of God even when he can't feel or see it. And in that place there is a place of trust where the rubber of hope meets the road of suffering is this place of trust of waiting on God. And as the psalmist waits on God, he says, \"You know what? God has been good to me.\" Because goodness is redefined is not defined by the prosperity, but the proximity of God. And this is the message of the Psalms over and over again is that God does not give us all the answers, but he gives us himself. Psalm 131 says, \"I do not lift my eyes to things too high or too hotty, but like a wean child with his mother, I come to God.\" a a toddler, something happens, you know, it's just everyday life. There's moments where there something happens, they get upset. You could logically explain that to them, but that is not going to help. What do you do? You hold them. You hold them in your arms and let them know they are okay. And I want to suggest that that's what what Psalm 131 holds out to us. God's not going that there are things too high, too marvelous, too outside of what we can understand. Why hasn't Jesus made all things new yet? I do not know. I do know this that he said that he will be with us always to the very end of the age and that he is in the process of working all things together for good for those who love him and are called according to his purpose. That he is unfolding his plan of redemption in and through this categorically new thing of Jew and Gentile, you and me coming together under this thing called the church. And he is bringing about his kingdom here and now. I do know that and I believe it and I believe that he is good and I don't always see it. But in that we have to be honest. God, this world is broken. Your kingdom come. Your will be done on earth as it is in heaven. Come redeem what is broken. And it is here as we hold on to hope. Regardless of what we feel, we say, \"God, I believe this is true. And I'm going to hope hold on to hope even when I do not see it. And he says in verse five, I trust in your unfailing love. My heart rejoices in your salvation. And I don't think he has a clue what that looks like at this moment. And some of you this morning have circumstances in your life, broken relationships, grief and loss where you are like, I don't know what salvation looks like in that. I don't know what deliverance or hope looks like, but I can rejoice in the reality that nothing I'm walking through today is outside of what the resurrection can reach. We are people of resurrection hopeus. >> But Lord, make us a people of lamenting hope. As I stood at the graveside of Rose's funeral that Ash Wednesday, uh, the gravity of the season of Lent settled on me in a way that it had never settled on me before. You see, in many ways, I realized that the season of Lent is a season of lament. It's a journey to the resurrection. These days leading up to Easter that requires us to be honest with the brokenness within ourselves, our society in our world. It begins on Ash Wednesday with those sobering words, \"From dust you came and to dust you shall return.\" A reminder of our mortality. We are invited in the season of Lent to mourn what is. To mourn our sin, to mourn our sickness, to mourn that this world is broken, that evil seems to win, that injustice is everywhere, and God at times seems nowhere to be seen. It is through lament that we hold on to hope. It is through lament that we can stand at a graveside and say resurrection is coming. Death does not have the final word. And we can sing with old himmwriter. When darkness veils his lovely face I rest on his unchanging grace. In every high and stormy gale, my anchor holds within the veil. Church, some of you this morning have things in your life that you need to lament and say, \"This isn't the way it was meant to be.\" It took me years. Mary and I have been married for 14 years. And it took me many years of our marriage for me to actually lament the fact that we wouldn't have biological children. I think I initially was like, I trust the Lord. It's his plan. He's good. Don't get me wrong, foster care and adoption has been the most beautiful thing in our lives. But there came a moment where I had to mourn that and say, \"God, bodies don't work like they're meant to. And that's not the way it was meant to be.\" And I wonder if some of you have something in your life that you've been pushing aside under theological jargon, saying, \"I I I'm supposed to be okay with this.\" And I think the invitation of Psalm 13 is it's not okay. That's why the resurrection matters. That's why we hold on to hope. I will trust your unfailing love because at times it feels like a long, oh Lord. So my invitation for you this morning is we're in a moment. We're going to sing a song of lament. We'll start sitting down. We're going to have prayer partners around the room uh wearing yellow lanyards. Some of you, I encourage you if if you're hurting this morning, I encourage you to be prayed for don't walk through this alone. But I want to encourage you to take the next couple minutes and make space for lament. Be honest about what you feel. Plead with God for what you want to feel. And hold on to hope regardless of what you feel. And I also want to add this. There are two psalms in the psalter, two psalms of lament, Psalm 39 and Psalm 88, that don't end in hope. In fact, Psalm 88 ends, \"Darkness is my only friend.\" And if that's you this morning, I want you to hear that psalm as an invitation to hold that before God. He sees you. I truly believe he loves you. And I truly believe that he is making all things new. And he's good even when you can't see it. [Music]","url":"https://www.youtube.com/watch?v=u3hsQ5bJ8QU"},{"id":"247spsTHZuE","date":"2025-08-07","title":"Life in the Waiting Room","scripture":"Psalm 130","preacher":"Peter Frey","series":"Psalms","desc":"","transcript":"The year was 2018. We were living in Boston. Mary was treated as a cystic fibrosis patient at Boston Children's Hospital. Cystic fibrosis is historically a children's disease thanks to the modern medicine that has rapidly changed and uh they would see adults at the children's hospital. remember we were there at the hospital for a operation that Mary was uh had to go through and so I know the drill well. We go to preop and they start asking all the questions. We sign all the papers and uh the time comes where they start uh the process to get ready to take her back to the O. As Mary prefers it, they'll start the sleeping meds before they wheel her back and she looks forward to this moment. It's just kind of weird like that. And so, uh, they started the sleepy meds and Boston Children's, they they just thought through it all, both for kids and parents, well, or spouses. And so, uh, they put these little footprints on the floor and say, \"All right, it's time for Mary to go to the O. You follow the blue footprint all the way to the waiting room.\" And so that's what I do. They wheel Mary down the hall. I'm like, \"Bye, honey.\" Bye, honey. She's carefree. and uh I um head to the waiting room. I remember uh walking in there. Boston Children's did well. They they try to make it as comfortable as possible. They have these nice windows with sunlight overlooking this historic Boston Street. They've got these comfy chairs and the places to sit, coffee to drink, and nobody is comfortable. remember sitting there taking in the room. I saw a couple sitting across from me. Um they have an empty stroller next to them. They're holding those magazines. You know the magazines? They have a waiting room that everybody holds and flips through but nobody reads. You know those. And they're just flipping. I can tell they aren't looking at anything and they're waiting. remember seeing a single mom sitting there and she's scrolling on her phone and they're like nothing's staying. It's just scroll scroll scroll. She's waiting. We're seeing another couple with a young child and the child as is fitting is restless in the waiting room and they're feeling irritated as they would be and they're waiting. Nobody's comfortable. I remember just sitting there thinking, feeling this uncomfortableness in my own soul and thinking, what is it about waiting that is so hard? And it dawned on me that day. It's because everybody sitting in this room feels powerless right now. We feel powerless because something between where we were and where we want to be is out of our control. That's hard. Powerlessness is hard. One of the things that I think we learn as we read the book of Psalms is that waiting is maybe not necessarily something we're meant to run from or to resist, but it's something that we're meant to develop as a discipline for our soul. What if waiting was not something we're supposed to passively just get through? And what if seasons of waiting are something that is deeply transformative for our lives. I'm not just talking about waiting in the waiting room. I'm talking about seasons where we're between where we were and where we want to be. Maybe for you it's the next job promotion, the next season of life. Maybe you're waiting for the kids to get out of the house. Maybe you're waiting to have kids. Maybe you're waiting for um some circumstance or relationship to be resolved in your life and you're in the in between where you were and where you want to be and you feel powerless. What are we supposed to do in those seasons? Where do we go in seasons of the in between the tension? where we were and where we want to be. Psalm 130 is a psalm about waiting. It's a psalm that comes in a in a series of psalms that are called the psalms of ascent. Eugene Peterson calls these the dogeared psalms of the Bible because they were a series of psalms that the people of Israel would return to again and again on their uh annual trip to Jerusalem to worship there at the temple. And so here in Psalm 130, we find a road trip playlist, a song that is meant to help you get between where you are and where you want to be. And I think that maybe the Lord has a message for each of us in whatever season you're in, wherever that applies to you, being in between. I think the Lord has a word for us. So Psalm 130, beginning in verse one, we read these words. Out of the depths I cry to you, Lord. Lord, hear my voice. Let your ears be attentive to my cry for mercy. Out of the depths I cry to you. All throughout the Psalms, the depths are a picture of a place of powerlessness. Ever been out on the water and a storm comes on upon you? I grew up around the Ches Bay in Maryland, well acquainted with this. When you're out on the water, everything's peaceful, it's calm, and then a storm comes and all of a sudden you feel really really powerless. And all throughout the scriptures, the the depths of the sea are a picture of that place of powerlessness. And so the psalmist uses this image to describe his season of life. I am in over my head. You ever been there? This is what waiting often feels like. I don't like waiting. I don't like waiting in waiting rooms. I don't like waiting for my Netflix to buffer. It's hard. Waiting is hard. And so, what does the psalmist tell us to do in seasons of waiting? I think 13 gives us a guide of of it's a it's a simple guide of how to develop the discipline of waiting in seasons of being between where you were and where you want to be. The first thing he tells us is to find your footing in the forgiveness of God. Look at verse three. If you Lord kept a record of sins, Lord, who could sin? But with you there is forgiveness so that we can with reverence serve you. It's interesting that the psalmist goes from out of the depths I cry to you Lord hear my voice and then goes to a a seemingly irrelevant tangent about forgiveness. But I think the psalmist word for us this morning is that in seasons of waiting and you feel like you're in over your head, you've got a place to stand. Find your footing in the forgiveness of God. Mary and I, for many years of our marriage, we had a standard poodle named Oliver. He was a puppy till the day he died. Uh stand poodles are full of energy. We were living on the north shore of Boston and we needed to find a way to get some of that energy out. And so, uh, we discovered Singing Beach. It's in Manchester by the Sea. And if you ever get a chance to go there, the sand is kind of cool. You walk in it and it squeaks and it kind of sounds like it's singing, hence the name Singing Beach. So, in the off season, this picture is actually taken at Singing Beach. In the off season, we would take Oliver to singing beach and you could let dogs run off leash there and he could get all the energy out that he needed. Well, one of the things we quickly discovered is that he loves the water. He loves to go into the ocean waves and throw the ball and he go out there, swim out to get it. One of the things we also discovered is that he learned to swim uh by uh gradually working up his confidence in going into the water. And and the thing about learning to swim in the ocean was he had the gradual uh decline into the water. And so he could he could venture as far as he wanted as he learned to find his footing. Well, some years later, we took Oliver to a friend's house. They had a swimming pool and Oliver saw the water and first instinct is I'm ready to go swimming and he runs jumps into the pool and all of a sudden Oliver's in pain. He's just flailing about in the water and uh like literal doggy paddle and um trying to trying to like find his bearings and Mary and I are standing on the edge of the pool. Do you think we'd be concerned dog parents? But the reality was he's in the shallow and we're just watching him flailing and panicking and then all of a sudden he goes from there to he his foot hits the bottom of the pool and then his other foot hits the bottom of the pool and he goes from this to he realized he had a place to sit. And I think that many times in my own life when that wave rushes over me and they tell you if you can swing it I move now and you get the call from the doctor or you just feel like man I'm just in the the daily grind of toddler life. We panic. We flap. I wonder how often God is standing there at the edge of our lives. You got a place to stand. We have a place to stand in the forgiveness of God. And this is why I think the psalmist goes here from the moment of being in the depths is because how often when we are in the in between of where we were and where we want to be, we are looking find our identity in where we want to be. You you know this process what your heart does. You're like, \"If only I can get to the summer. If only I can get to the weekend then. I mean, once I get out of this busy season, maybe then I will.\" And we start to find our identity in what we want to be rather than who we are in Christ. And this is the message of the gospel all the way back in Psalm 130 is find your footing in the gospel that before you are in a circumstance or before you perform or before you act, God says you are loved, you are called to purpose and you have a place to stand. And so in those seasons of waiting between where you were and where you want to be. Resist the temptation to find your identity in a circumstance and come back to the gospel of Jesus and love. You've got a place to stand. And notice that that's what the psalmist says. With you there is forgiveness so that with reverence we may serve you. There is a place to stand and a place to find purpose even in this season of waiting. And so find your footing in the forgiveness of God. I remember when we made the move in 2019, I stepped out of ministry. I've been pastoring uh for many years at that point and it was a disorienting season for me because all of a sudden my identity as a pastor was no longer my vocation. and we make the move for Mary's health and I'm struggling because I realized I had found a lot of my identity in a circumstance in my life rather than who God says I am. And there was this process for me of the Lord saying, \"Peter, you've got a place to stand. Your identity isn't wrapped up in what you do for me. You are loved. You are defined as a child of God before you do anything. So you have a place to stand. So first thing you do is find your footing in the forgiveness of God. Second thing the psalmist tells us is to hold on to the promises of God. Look at verse five. I wait for the Lord. My whole being   var start = Math.max(0, idx - 80);
  var end = Math.min(transcript.length, idx + 220);
  return (start > 0 ? '...' : '') + hi(transcript.slice(start, end).trim(), q) + (end < transcript.length ? '...' : '');
}

function toggleTx(btn) {
  var card = btn.parentNode.parentNode;
  var box = card.querySelector('.tx-full');
  var isOpen = box.classList.toggle('open');
  btn.textContent = isOpen ? 'Hide transcript' : 'Show transcript';
}

function buildFilters() {
  var ordered = [];
  for (var i = 0; i < SERIES_ORDER.length; i++) {
    if (allSeries.indexOf(SERIES_ORDER[i]) >= 0) { ordered.push(SERIES_ORDER[i]); }
  }
  var rest = [];
  for (var i = 0; i < allSeries.length; i++) {
    if (SERIES_ORDER.indexOf(allSeries[i]) < 0) { rest.push(allSeries[i]); }
  }
  var all = ['All'].concat(ordered).concat(rest);
  var el = document.getElementById('filters');
  el.innerHTML = '';
  for (var i = 0; i < all.length; i++) {
    var btn = document.createElement('button');
    btn.className = all[i] === active ? 'fb on' : 'fb';
    btn.textContent = all[i];
    (function(name) { btn.onclick = function() { setFilter(name); }; })(all[i]);
    el.appendChild(btn);
  }
  document.getElementById('total').textContent = withTranscripts === DATA.length
    ? 'Full transcripts - ' + DATA.length + ' sermons'
    : DATA.length + ' sermons' + (withTranscripts ? ' (' + withTranscripts + ' with transcripts)' : '');
}

function setFilter(f) { active = f; buildFilters(); render(); }

function render() {
  var raw = document.getElementById('q').value.trim();
  var q = raw.toLowerCase();
  var list = [];
  for (var i = 0; i < DATA.length; i++) {
    var s = DATA[i];
    if (active !== 'All' && s.series !== active) { continue; }
    if (!q) { list.push(s); continue; }
    if (s.title.toLowerCase().indexOf(q) >= 0 ||
        s.scripture.toLowerCase().indexOf(q) >= 0 ||
        s.preacher.toLowerCase().indexOf(q) >= 0 ||
        s.series.toLowerCase().indexOf(q) >= 0 ||
        s.desc.toLowerCase().indexOf(q) >= 0 ||
        (s.transcript && s.transcript.toLowerCase().indexOf(q) >= 0)) {
      list.push(s);
    }
  }
  document.getElementById('meta').textContent =
    (q || active !== 'All') ? list.length + ' sermon' + (list.length !== 1 ? 's' : '') + ' found' : '';
  if (!list.length) {
    document.getElementById('results').innerHTML = '<div class=empty>No sermons match your search.</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    var txSnip = excerpt(s.transcript, raw);
    var txHtml = txSnip ? '<div class="tx-hit">...' + txSnip + '...</div>' : '';
    var badge  = s.series ? '<span class="sb">' + esc(s.series) + '</span>' : '';
    var txBtn  = s.transcript ? '<button class="tb" onclick="toggleTx(this)">Show transcript</button>' : '';
    var txFull = s.transcript ? '<div class="tx-full">' + esc(s.transcript) + '</div>' : '';
    html += '<div class="card">';
    html += '<div class="ct">' + hi(s.title, raw) + '</div>';
    html += '<div class="cm"><span>' + fmt(s.date) + '</span><span>' + esc(s.preacher) + '</span>' + badge + '</div>';
    html += '<div class="cd">' + hi(s.desc, raw) + '</div>';
    html += txHtml + txFull;
    html += '<div class="cf">';
    html += '<span class="tag">' + esc(s.scripture) + '</span>';
    html += '<a class="wl" href="' + s.url + '" target="_blank">Watch</a>';
    html += txBtn;
    html += '</div></div>';
  }
  document.getElementById('results').innerHTML = html;
}

buildFilters();
render();
</script>
</body>
</html>
